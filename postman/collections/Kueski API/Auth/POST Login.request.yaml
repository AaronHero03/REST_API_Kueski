$kind: http-request
name: POST Login
method: POST
url: "{{baseUrl}}/auth/login"
order: 1000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "ana.garcia@gmail.com ",
      "password": "hashed_pass_001"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();

      // ✅ Happy path tests (status 200)
      if (pm.response.code === 200) {
          pm.test("✅ [200] Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("✅ [200] Response has status 'success'", function () {
              pm.expect(jsonData.status).to.eql("success");
          });

          pm.test("✅ [200] Response time is below 1000ms", function () {
              pm.expect(pm.response.responseTime).to.be.below(1000);
          });

          pm.test("✅ [200] Response has data.token with valid JWT format", function () {
              pm.expect(jsonData.data).to.have.property("token");
              pm.expect(jsonData.data.token).to.be.a("string");
              pm.expect(jsonData.data.token).to.match(/^[\w-]+\.[\w-]+\.[\w-]+$/);
          });

          pm.test("✅ [200] data.user has id_cliente", function () {
              pm.expect(jsonData.data.user).to.have.property("id_cliente");
              pm.expect(jsonData.data.user.id_cliente).to.be.a("string");
          });

          pm.test("✅ [200] data.user has nombre", function () {
              pm.expect(jsonData.data.user).to.have.property("nombre");
              pm.expect(jsonData.data.user.nombre).to.be.a("string");
          });

          pm.test("✅ [200] data.user has email", function () {
              pm.expect(jsonData.data.user).to.have.property("email");
              pm.expect(jsonData.data.user.email).to.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
          });

          pm.test("✅ [200] Content-Type is application/json", function () {
              pm.response.to.have.header("Content-Type");
              pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
          });

          // 💾 Save token to environment variable
          if (jsonData.data && jsonData.data.token) {
              pm.environment.set("authToken", jsonData.data.token);
              console.log("✅ authToken saved to environment");
          }
      }

      // ❌ Fail path: wrong credentials (401)
      if (pm.response.code === 401) {
          pm.test("❌ [401] Status code is 401 for wrong credentials", function () {
              pm.response.to.have.status(401);
          });

          pm.test("❌ [401] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [401] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.be.a("string");
          });
      }

      // ❌ Fail path: missing fields (400)
      if (pm.response.code === 400) {
          pm.test("❌ [400] Status code is 400 for missing fields", function () {
              pm.response.to.have.status(400);
          });

          pm.test("❌ [400] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [400] Response has validation error message", function () {
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.be.a("string");
          });
      }

      // ❌ Fail path: server error (500)
      if (pm.response.code === 500) {
          pm.test("❌ [500] Status code is 500 - server error", function () {
              pm.response.to.have.status(500);
          });
      }
    language: text/javascript
