$kind: http-request
name: GET Loans
method: GET
url: '{{baseUrl}}/users/loans'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      var jsonData = pm.response.json();

      // ✅ Happy path tests (status 200)
      if (pm.response.code === 200) {
          pm.test("✅ [200] Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("✅ [200] Response has status 'success'", function () {
              pm.expect(jsonData.status).to.eql("success");
          });

          pm.test("✅ [200] Response time is below 1000ms", function () {
              pm.expect(pm.response.responseTime).to.be.below(1000);
          });

          pm.test("✅ [200] Content-Type is application/json", function () {
              pm.response.to.have.header("Content-Type");
              pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
          });

          pm.test("✅ [200] data.summary.total_active is a non-negative number", function () {
              pm.expect(jsonData.data.summary).to.have.property("total_active");
              pm.expect(jsonData.data.summary.total_active).to.be.a("number");
              pm.expect(jsonData.data.summary.total_active).to.be.at.least(0);
          });

          pm.test("✅ [200] data.summary.next_due_date is a valid date string", function () {
              pm.expect(jsonData.data.summary).to.have.property("next_due_date");
              pm.expect(jsonData.data.summary.next_due_date).to.be.a("string");
              pm.expect(new Date(jsonData.data.summary.next_due_date).toString()).to.not.eql("Invalid Date");
          });

          pm.test("✅ [200] data.active_loans is an array", function () {
              pm.expect(jsonData.data).to.have.property("active_loans");
              pm.expect(jsonData.data.active_loans).to.be.an("array");
          });

          pm.test("✅ [200] data.active_loans has at least one item", function () {
              pm.expect(jsonData.data.active_loans.length).to.be.above(0);
          });

          pm.test("✅ [200] Each loan has required fields with correct types", function () {
              jsonData.data.active_loans.forEach(function (loan) {
                  pm.expect(loan).to.have.property("id_prestamo");
                  pm.expect(loan).to.have.property("cantidad");
                  pm.expect(loan).to.have.property("cuotas");
                  pm.expect(loan).to.have.property("monto_cuota");
                  pm.expect(loan.id_prestamo).to.be.a("string");
                  pm.expect(loan.cantidad).to.be.a("number");
                  pm.expect(loan.cuotas).to.be.a("number");
                  pm.expect(loan.monto_cuota).to.be.a("number");
              });
          });

          pm.test("✅ [200] Each loan cantidad is greater than 0", function () {
              jsonData.data.active_loans.forEach(function (loan) {
                  pm.expect(loan.cantidad).to.be.above(0);
              });
          });

          pm.test("✅ [200] data.summary.total_active matches active_loans count", function () {
              pm.expect(jsonData.data.summary.total_active).to.eql(jsonData.data.active_loans.length);
          });
      }

      // ❌ Fail path: unauthorized - no token (401)
      if (pm.response.code === 401) {
          pm.test("❌ [401] Status code is 401 - unauthorized", function () {
              pm.response.to.have.status(401);
          });

          pm.test("❌ [401] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [401] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.be.a("string");
          });
      }

      // ❌ Fail path: expired/invalid token (403)
      if (pm.response.code === 403) {
          pm.test("❌ [403] Status code is 403 - forbidden / token expired", function () {
              pm.response.to.have.status(403);
          });

          pm.test("❌ [403] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [403] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
          });
      }

      // ❌ Fail path: no loans found (404)
      if (pm.response.code === 404) {
          pm.test("❌ [404] Status code is 404 - no loans found", function () {
              pm.response.to.have.status(404);
          });

          pm.test("❌ [404] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [404] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
          });
      }