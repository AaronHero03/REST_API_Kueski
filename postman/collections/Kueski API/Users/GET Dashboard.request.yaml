$kind: http-request
name: GET Dashboard
method: GET
url: '{{baseUrl}}/users/me/dashboard'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      var jsonData = pm.response.json();

      // ✅ Happy path tests (status 200)
      if (pm.response.code === 200) {
          pm.test("✅ [200] Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("✅ [200] Response has status 'success'", function () {
              pm.expect(jsonData.status).to.eql("success");
          });

          pm.test("✅ [200] Response time is below 1000ms", function () {
              pm.expect(pm.response.responseTime).to.be.below(1000);
          });

          pm.test("✅ [200] Content-Type is application/json", function () {
              pm.response.to.have.header("Content-Type");
              pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
          });

          pm.test("✅ [200] data.balance.available is a non-negative number", function () {
              pm.expect(jsonData.data.balance).to.have.property("available");
              pm.expect(jsonData.data.balance.available).to.be.a("number");
              pm.expect(jsonData.data.balance.available).to.be.at.least(0);
          });

          pm.test("✅ [200] data.balance.currency is 'MXN'", function () {
              pm.expect(jsonData.data.balance.currency).to.eql("MXN");
          });

          pm.test("✅ [200] data.cashback.available is a non-negative number", function () {
              pm.expect(jsonData.data.cashback).to.have.property("available");
              pm.expect(jsonData.data.cashback.available).to.be.a("number");
              pm.expect(jsonData.data.cashback.available).to.be.at.least(0);
          });

          pm.test("✅ [200] data has user info", function () {
              pm.expect(jsonData.data).to.have.property("user");
          });

          pm.test("✅ [200] data.user has nombre", function () {
              if (jsonData.data.user) {
                  pm.expect(jsonData.data.user).to.have.property("nombre");
                  pm.expect(jsonData.data.user.nombre).to.be.a("string");
              }
          });

          pm.test("✅ [200] data has loans summary", function () {
              pm.expect(jsonData.data).to.have.property("loans");
          });
      }

      // ❌ Fail path: unauthorized - no token (401)
      if (pm.response.code === 401) {
          pm.test("❌ [401] Status code is 401 - unauthorized", function () {
              pm.response.to.have.status(401);
          });

          pm.test("❌ [401] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [401] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.be.a("string");
          });
      }

      // ❌ Fail path: expired/invalid token (403)
      if (pm.response.code === 403) {
          pm.test("❌ [403] Status code is 403 - forbidden / token expired", function () {
              pm.response.to.have.status(403);
          });

          pm.test("❌ [403] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [403] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
          });
      }

      // ❌ Fail path: server error (500)
      if (pm.response.code === 500) {
          pm.test("❌ [500] Status code is 500 - server error", function () {
              pm.response.to.have.status(500);
          });
      }