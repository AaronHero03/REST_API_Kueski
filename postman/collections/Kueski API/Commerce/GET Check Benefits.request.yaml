$kind: http-request
name: GET Check Benefits
method: GET
url: "{{baseUrl}}/commerce/benefits"
order: 1000
auth:
  type: bearer
  credentials:
    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZF9jbGllbnRlIjoidXNlcl8wMDAxIiwiZW1haWwiOiJ2YWxlcmlhQGt1ZXNraS5jb20iLCJpYXQiOjE3NzkzOTgwNDUsImV4cCI6MTc3OTQwNTI0NX0.DZn2u7gy-eIlfqUOA5EHC3rAskxhoRQ9DcP-DneqrYQ
queryParams:
  domain: amazon.com.mx
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();

      // ✅ Happy path tests (status 200)
      if (pm.response.code === 200) {
          pm.test("✅ [200] Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("✅ [200] Response has status 'success'", function () {
              pm.expect(jsonData.status).to.eql("success");
          });

          pm.test("✅ [200] Response time is below 1000ms", function () {
              pm.expect(pm.response.responseTime).to.be.below(1000);
          });

          pm.test("✅ [200] Response has data object", function () {
              pm.expect(jsonData).to.have.property("data");
              pm.expect(jsonData.data).to.be.an("object");
          });

          pm.test("✅ [200] data.is_partner is a boolean", function () {
              pm.expect(jsonData.data).to.have.property("is_partner");
              pm.expect(jsonData.data.is_partner).to.be.a("boolean");
          });

          pm.test("✅ [200] Content-Type is application/json", function () {
              pm.response.to.have.header("Content-Type");
              pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
          });

          if (jsonData.data.is_partner === true) {
              pm.test("✅ [200] Partner: cashback_percentage exists and is a number", function () {
                  pm.expect(jsonData.data).to.have.property("cashback_percentage");
                  pm.expect(jsonData.data.cashback_percentage).to.be.a("number");
              });

              pm.test("✅ [200] Partner: cashback_percentage is between 0 and 100", function () {
                  pm.expect(jsonData.data.cashback_percentage).to.be.at.least(0);
                  pm.expect(jsonData.data.cashback_percentage).to.be.at.most(100);
              });

              pm.test("✅ [200] Partner: partner_name exists and is a string", function () {
                  if (jsonData.data.partner_name !== undefined) {
                      pm.expect(jsonData.data.partner_name).to.be.a("string");
                  }
              });
          }

          if (jsonData.data.is_partner === false) {
              pm.test("✅ [200] Non-partner: cashback_percentage is 0 or absent", function () {
                  if (jsonData.data.cashback_percentage !== undefined) {
                      pm.expect(jsonData.data.cashback_percentage).to.eql(0);
                  }
              });
          }
      }

      // ❌ Fail path: missing domain query param (400)
      if (pm.response.code === 400) {
          pm.test("❌ [400] Status code is 400 for missing domain param", function () {
              pm.response.to.have.status(400);
          });

          pm.test("❌ [400] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [400] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.be.a("string");
          });
      }

      // ❌ Fail path: unauthorized (401)
      if (pm.response.code === 401) {
          pm.test("❌ [401] Status code is 401 - unauthorized", function () {
              pm.response.to.have.status(401);
          });

          pm.test("❌ [401] Response has status 'error'", function () {
              pm.expect(jsonData.status).to.eql("error");
          });

          pm.test("❌ [401] Response has error message", function () {
              pm.expect(jsonData).to.have.property("message");
          });
      }

      // ❌ Fail path: forbidden (403)
      if (pm.response.code === 403) {
          pm.test("❌ [403] Status code is 403 - forbidden", function () {
              pm.response.to.have.status(403);
          });
      }
    language: text/javascript
